<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="620" fill="#ffffff" />

  <text x="590" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">Marshal-Bot - Architecture Overview</text>

  <!-- Discord -->
  <rect x="300" y="55" width="560" height="70" rx="12" fill="#5865F2" stroke="#4752C4" stroke-width="1.5" />
  <text x="580" y="85" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Discord</text>
  <text x="580" y="105" text-anchor="middle" font-size="12" fill="#e6e8ff">(Client &amp; Servers)</text>

  <!-- Process container -->
  <rect x="250" y="165" width="640" height="170" fill="none" stroke="#999999" stroke-width="1.5" stroke-dasharray="6,4" />
  <text x="262" y="182" font-size="11" font-style="italic" fill="#666666">Marshal-Bot - Node.js process (src/)</text>

  <!-- Commands + Events -->
  <rect x="280" y="195" width="280" height="110" rx="8" fill="#EEF3FF" stroke="#5865F2" stroke-width="1.5" />
  <text x="420" y="235" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Commands &amp; Events</text>
  <text x="420" y="256" text-anchor="middle" font-size="11" fill="#333333">interactionCreate, moderation,</text>
  <text x="420" y="272" text-anchor="middle" font-size="11" fill="#333333">logging, automod...</text>

  <!-- Background Schedulers -->
  <rect x="580" y="195" width="280" height="110" rx="8" fill="#EEF3FF" stroke="#5865F2" stroke-width="1.5" />
  <text x="720" y="235" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Background Schedulers</text>
  <text x="720" y="256" text-anchor="middle" font-size="11" fill="#333333">reminders, giveaways,</text>
  <text x="720" y="272" text-anchor="middle" font-size="11" fill="#333333">birthdays, alerts</text>

  <!-- SQLite -->
  <rect x="350" y="455" width="340" height="80" rx="10" fill="#003B57" stroke="#00283D" stroke-width="1.5" />
  <text x="520" y="490" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">SQLite Database</text>
  <text x="520" y="510" text-anchor="middle" font-size="11" fill="#cfe3ee">data/bot.sqlite</text>

  <!-- Pikud Haoref API -->
  <rect x="970" y="195" width="190" height="110" rx="8" fill="#FDECEA" stroke="#E53935" stroke-width="1.5" />
  <text x="1065" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#7a1a17">Pikud Haoref API</text>
  <text x="1065" y="242" text-anchor="middle" font-size="10.5" fill="#7a1a17">unofficial wrapper</text>
  <text x="1065" y="257" text-anchor="middle" font-size="10.5" fill="#7a1a17">by eladnava</text>
  <text x="1065" y="277" text-anchor="middle" font-size="9.5" fill="#a04440">github.com/eladnava/</text>
  <text x="1065" y="290" text-anchor="middle" font-size="9.5" fill="#a04440">pikud-haoref-api</text>

  <!-- Edges -->
  <line x1="420" y1="125" x2="420" y2="195" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)" />
  <rect x="345" y="150" width="150" height="16" fill="#ffffff" opacity="0.9" />
  <text x="420" y="162" text-anchor="middle" font-size="10.5" fill="#333333">interactions / replies</text>

  <line x1="720" y1="125" x2="720" y2="195" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)" />
  <rect x="655" y="150" width="130" height="16" fill="#ffffff" opacity="0.9" />
  <text x="720" y="162" text-anchor="middle" font-size="10.5" fill="#333333">scheduled messages</text>

  <line x1="420" y1="305" x2="470" y2="455" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)" />
  <rect x="380" y="368" width="80" height="16" fill="#ffffff" opacity="0.9" />
  <text x="420" y="380" text-anchor="middle" font-size="10.5" fill="#333333">read / write</text>

  <line x1="720" y1="305" x2="660" y2="455" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)" />
  <rect x="650" y="368" width="80" height="16" fill="#ffffff" opacity="0.9" />
  <text x="690" y="380" text-anchor="middle" font-size="10.5" fill="#333333">read / write</text>

  <line x1="970" y1="250" x2="860" y2="250" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)" />
  <rect x="862" y="230" width="106" height="16" fill="#ffffff" opacity="0.9" />
  <text x="915" y="242" text-anchor="middle" font-size="10" fill="#333333">poll every 5s</text>

  <text x="590" y="600" text-anchor="middle" font-size="10.5" fill="#888888">Data via pikud-haoref-api by Elad Nava - github.com/eladnava/pikud-haoref-api (unofficial Pikud Haoref API wrapper)</text>
</svg>
